name: Automated VCU Build & Deploy

on:
  push:
    branches: [ main ] # Triggers automatically whenever you push to main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware (C++)
        run: pio run -e lilygo_t2can

      - name: Build Filesystem Image (LittleFS)
        run: pio run -t buildfs -e lilygo_t2can

      - name: Prepare Artifacts for GitHub Pages
        run: |
          mkdir -p docs
          cp .pio/build/lilygo_t2can/firmware.bin docs/
          cp .pio/build/lilygo_t2can/littlefs.bin docs/

      - name: Deploy Binaries to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs