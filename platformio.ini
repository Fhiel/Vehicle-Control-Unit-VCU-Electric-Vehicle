; platformio.ini - VCU Master Control Project
; Supporting T-CAN485 (Legacy) and T-2CAN (New)

[platformio]
default_envs = lilygo_t2can  ; Default environment for new development

; --- SHARED CONFIGURATION (Applied to all environments) ---
[env]
platform = espressif32@^6.5.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.filesystem = littlefs

lib_deps = 
    freenove/Freenove WS2812 Lib for ESP32 @ ^1.0.5
    https://github.com/mathieucarbou/AsyncTCP.git @ 3.3.2
    https://github.com/mathieucarbou/ESPAsyncWebServer.git @ 3.6.0
    ayushsharma82/ElegantOTA @ 3.1.7
    bblanchon/ArduinoJson @ 7.1.0
    https://github.com/autowp/arduino-mcp2515.git

lib_ignore = 
    me-no-dev/AsyncTCP
    me-no-dev/ESPAsyncWebServer
    ESPAsyncTCP

; ----------------------------------------------------
; 1. ENVIRONMENT: LILYGO T-2CAN (New Hardware)
; ----------------------------------------------------
[env:lilygo_t2can]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
lib_ldf_mode = chain
lib_compat_mode = off

; --- Memory & Flash Configuration ---
; We use qio_qspi to ensure GPIO 6-10 are not reserved for Octal PSRAM.
; This allows the CAN transceiver on GPIO 6/7 to function.
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_qspi 
board_upload.flash_size = 16MB
; partitions optimized for useable 8MB flash with 4MB OTA slots and 4MB LittleFS
board_build.partitions = partitions_t2can.csv

; --- Monitor & Upload ---
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
monitor_dtr = 1
monitor_rts = 1

build_flags = 
    -D HARDWARE_T2CAN
    -D CORE_DEBUG_LEVEL=1
    ; PSRAM is disabled to prevent pin conflict with CANB (GPIO 6/7)
    ; -D BOARD_HAS_PSRAM 
    -D ARDUINO_USB_CDC_ON_BOOT=1 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_RUNNING_CORE=1
    -D ARDUINO_EVENT_RUNNING_CORE=1
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -D ELEGANTOTA_FS=LittleFS

; ----------------------------------------------------
; 2. ENVIRONMENT: LILYGO T-CAN485 (Legacy Hardware)
; ----------------------------------------------------
[env:lilygo_t_can485]
board = esp32dev
board_build.f_cpu = 240000000L
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_build.partitions = partitions.csv
build_flags = 
    -D HARDWARE_TCAN485
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_RUNNING_CORE=1
    -D ARDUINO_EVENT_RUNNING_CORE=0
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1