; platformio.ini - VCU Master Control Project

[env:lilygo_t_can485]
; ----------------------------------------------------
; 1. BOARD & FRAMEWORK
; ----------------------------------------------------
platform = espressif32@^6.5.0
board = esp32dev
framework = arduino

; ----------------------------------------------------
; 2. MEMORY & PARTITIONS
; ----------------------------------------------------
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_upload.flash_size = 4MB
board_build.flash_mode = dio

; ----------------------------------------------------
; 3. MONITOR & DEBUGGING
; ----------------------------------------------------
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ----------------------------------------------------
; 4. LIBRARY DEPENDENCIES
; ----------------------------------------------------
lib_deps = 
    ; LED Control
    fastled/FastLED@^3.10.3
    
    ; Web Server & Async Communication (Core 0 tasks)
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    ayushsharma82/ElegantOTA@^3.1.1  
    bblanchon/ArduinoJson@^7.1.0

; ----------------------------------------------------
; 5. CPU & CORE SETTINGS
; ----------------------------------------------------
; Set CPU frequency to 240MHz for D0WD-V3 to handle 
; TWAI (CAN), RS485, and WiFi concurrently.
board_build.f_cpu = 240000000L

; ----------------------------------------------------
; 6. BUILD FLAGS (Optional but Recommended)
; ----------------------------------------------------
build_flags = 
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_RUNNING_CORE=1
    -D ARDUINO_EVENT_RUNNING_CORE=0
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1