name: Automated VCU Build & Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Aktualisiert auf v4 (unterstützt nativ die neuen Node-Runner)
      - name: Checkout Code
        uses: actions/checkout@v4

      # Aktualisiert auf v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware (C++)
        run: pio run -e lilygo_t2can

      - name: Build Filesystem Image (LittleFS)
        run: pio run -t buildfs -e lilygo_t2can

      - name: Prepare Artifacts for GitHub Pages
        run: |
          mkdir -p docs
          cp .pio/build/lilygo_t2can/firmware.bin docs/
          cp .pio/build/lilygo_t2can/littlefs.bin docs/

      # Gewechselt auf die offizielle GitHub-eigene Pages-Aktion (v4)
      # Diese ist perfekt auf Node 24 optimiert und wirft garantiert keine Warnung mehr!
      - name: Deploy Binaries to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy-pages:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4