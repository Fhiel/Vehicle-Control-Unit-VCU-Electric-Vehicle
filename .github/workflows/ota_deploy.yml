name: Automated VCU Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write    # Wichtig für Releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CalVer Version
        id: calver
        run: |
          YEAR=$(date +'%Y')
          WEEK=$(date +'%V')
          RUN_NUMBER=${{ github.run_number }}
          VERSION="${YEAR}.${WEEK}.${RUN_NUMBER}"
          echo "FW_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Inject Secrets + Version
        run: |
          cat <<EOF > include/secrets.h
          #ifndef SECRETS_H
          #define SECRETS_H

          #define DEVICE_HOSTNAME "vcu-x19e"
          #define AP_SSID       "VCU_Bertone_X19e"
          #define AP_PASS       "19832026"
          #define HOME_SSID "${{ secrets.WIFI_SSID }}"
          #define HOME_PASS "${{ secrets.WIFI_PASS }}"
          #define OTA_USER "${{ secrets.OTA_USER }}"
          #define OTA_PASS "${{ secrets.OTA_PASS }}"
          #define FW_VERSION "${{ steps.calver.outputs.FW_VERSION }}"

          #endif
          EOF

      - name: Build Firmware
        run: pio run -e lilygo_t2can

      - name: Build LittleFS
        run: pio run -t buildfs -e lilygo_t2can

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calver.outputs.FW_VERSION }}
          name: VCU Firmware ${{ steps.calver.outputs.FW_VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            .pio/build/lilygo_t2can/firmware.bin
            .pio/build/lilygo_t2can/littlefs.bin

      - name: Upload Version Info
        run: |
          echo "${{ steps.calver.outputs.FW_VERSION }}" > version.txt
          # Optional: Auch auf GitHub Pages legen, falls du das noch nutzen willst