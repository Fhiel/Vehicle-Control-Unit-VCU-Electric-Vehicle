name: Automated VCU Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # DER MAGISCHE SCHRITT: Erzeugt die secrets.h im src-Ordner aus den GitHub-Secrets
      - name: Inject Secrets into secrets.h
        run: |
          cat <<EOF > src/secrets.h
          #ifndef SECRETS_H
          #define SECRETS_H

          #define WIFI_SSID "${{ secrets.WIFI_SSID }}"
          #define WIFI_PASS "${{ secrets.WIFI_PASS }}"
          #define OTA_USER "${{ secrets.OTA_USER }}"
          #define OTA_PASS "${{ secrets.OTA_PASS }}"

          #endif
          EOF

      - name: Build Firmware (C++)
        run: pio run -e lilygo_t2can

      - name: Build Filesystem Image (LittleFS)
        run: pio run -t buildfs -e lilygo_t2can

      - name: Prepare Artifacts for GitHub Pages
        run: |
          mkdir -p docs
          cp .pio/build/lilygo_t2can/firmware.bin docs/
          cp .pio/build/lilygo_t2can/littlefs.bin docs/

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4