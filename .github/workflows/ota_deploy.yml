name: Automated VCU Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write    # Crucial: Changed from read to write so the action can push Git Version Tags
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so tracking rules can find commit sequences if needed

      - name: Generate Dynamic CalVer String
        id: calver
        run: |
          YEAR=$(date +'%Y')
          WEEK=$(date +'%V')
          RUN_NUMBER=${{ github.run_number }}
          VERSION_STRING="${YEAR}.${WEEK}.${RUN_NUMBER}"
          echo "FW_VERSION=$VERSION_STRING" >> $GITHUB_OUTPUT
          echo "Generated Version Tag: $VERSION_STRING"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # EXTENDED STEP: Now appends the dynamic CalVer directly into your build target environment
      - name: Inject Secrets and Version into secrets.h
        run: |
          cat <<EOF > include/secrets.h
          #ifndef SECRETS_H
          #define SECRETS_H

          // --- Access Point Settings (Car Internal Network) ---
          #define AP_SSID       "VCU_Bertone_X19e"
          #define AP_PASS       "19832026"
          // Map your existing GitHub Action secrets directly to your code's variable names
          #define HOME_SSID "${{ secrets.WIFI_SSID }}"
          #define HOME_PASS "${{ secrets.WIFI_PASS }}"
          #define OTA_USER "${{ secrets.OTA_USER }}"
          #define OTA_PASS "${{ secrets.OTA_PASS }}"
          
          #define FW_VERSION "${{ steps.calver.outputs.FW_VERSION }}"

          #endif
          EOF

      - name: Build Firmware (C++)
        run: pio run -e lilygo_t2can

      - name: Build Filesystem Image (LittleFS)
        run: pio run -t buildfs -e lilygo_t2can

      - name: Prepare Artifacts for GitHub Pages
        run: |
          mkdir -p docs
          cp .pio/build/lilygo_t2can/firmware.bin docs/
          cp .pio/build/lilygo_t2can/littlefs.bin docs/
          # Write version file into docs so the Expert page can easily fetch it via HTTP if required
          echo "${{ steps.calver.outputs.FW_VERSION }}" > docs/version.txt

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      # NEW STEP: Automatically creates and pushes a true Release Tag onto your GitHub Repository view
      - name: Create and Push GitHub Version Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.calver.outputs.FW_VERSION }}" -m "Automated VCU Release Build v${{ steps.calver.outputs.FW_VERSION }}"
          git push origin "${{ steps.calver.outputs.FW_VERSION }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4